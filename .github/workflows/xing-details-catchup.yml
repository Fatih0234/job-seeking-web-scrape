name: XING Details Catch-up

concurrency:
  group: xing-details-catchup-${{ github.ref_name }}
  # Details runs can take long; cancel older in-progress runs to avoid pileups.
  cancel-in-progress: false

on:
  schedule:
    # Daily at 08:30 UTC
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      max_job_details_per_run:
        description: "Max XING job details to scrape this run"
        required: false
        default: "100"
        type: string
      last_seen_window_days:
        description: "Only scrape details for jobs seen within N days"
        required: false
        default: "7"
        type: string

jobs:
  details:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture workflow start (UTC)
        id: workflow_meta
        run: |
          echo "workflow_start_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run unit tests
        continue-on-error: true
        run: |
          python -m unittest discover -s tests -p "test_*.py"

      - name: Random start jitter
        run: |
          sleep $((RANDOM % 900))

      - name: Run XING details catch-up (no discovery)
        id: run_xing_crawl
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}

          CRAWL_TRIGGER: ${{ github.event_name == 'schedule' && 'github_schedule_xing_details' || 'github_manual_xing_details' }}
          ENSURE_XING_TABLES: "1"
          RUN_DISCOVERY: "0"
          RUN_DETAILS: "1"

          MAX_JOB_DETAILS_PER_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.max_job_details_per_run || '100' }}
          DETAIL_LAST_SEEN_WINDOW_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.last_seen_window_days || '7' }}
          DETAIL_STALENESS_DAYS: "14"

          # Keep the crawl safe/steady.
          CIRCUIT_BREAKER_BLOCKS: "3"
          DETAIL_DEBUG_FAILURE_LIMIT: "5"
          XING_DETAILS_TIMEOUT_SECONDS: "2400"
        run: |
          set -euo pipefail
          run_json_path="$(mktemp)"
          set +e
          python -m scripts.run_crawl_xing | tee "$run_json_path"
          cmd_exit=${PIPESTATUS[0]}
          set -e
          crawl_run_id="$(tail -n 1 "$run_json_path" | python -c 'import json,sys; s=sys.stdin.read().strip(); print((json.loads(s).get(\"crawl_run_id\") or \"\").strip() if s else \"\")' 2>/dev/null || true)"
          if [ -n "${crawl_run_id}" ]; then
            echo "crawl_run_id=${crawl_run_id}" >> "$GITHUB_OUTPUT"
            echo "CRAWL_RUN_ID=${crawl_run_id}" >> "$GITHUB_ENV"
          fi
          exit "${cmd_exit}"

      - name: Refresh dashboard read models
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
        run: |
          python -m scripts.refresh_dashboard_read_models

      - name: Report latest run (XING)
        if: always()
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
          REPORT_SOURCE: xing
          REPORT_RUN_ID: ${{ steps.run_xing_crawl.outputs.crawl_run_id }}
        run: |
          python -m scripts.report_latest_run

      - name: Verify XING run integrity
        if: always()
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
        run: |
          python -m scripts.verify_xing_workflow_run \
            --workflow-event "${{ github.event_name }}" \
            --workflow-name "XING Details Catch-up" \
            --workflow-start-utc "${{ steps.workflow_meta.outputs.workflow_start_utc }}" \
            --run-step-outcome "${{ steps.run_xing_crawl.outcome }}" \
            --crawl-run-id "${{ steps.run_xing_crawl.outputs.crawl_run_id }}" \
            --stale-minutes 180 \
            --repair-stale 1 \
            --strict 1

      - name: Upload artifacts (output/)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-xing-details
          path: output/**
          if-no-files-found: warn
