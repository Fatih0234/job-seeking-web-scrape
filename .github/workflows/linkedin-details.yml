name: LinkedIn Details

concurrency:
  group: linkedin-details-${{ github.ref_name }}
  cancel-in-progress: true

on:
  schedule:
    # Twice daily at 11:15 UTC and 23:15 UTC
    - cron: "15 11,23 * * *"
  workflow_dispatch: {}

jobs:
  details:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Random start jitter
        # Reduce "cron fingerprinting" by not always hitting LinkedIn at the same minute.
        run: |
          s=$((RANDOM % 900))
          echo "Sleeping ${s}s before starting details crawl..."
          sleep "$s"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean output directory
        run: rm -rf output/

      - name: Run details-only crawl
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
          CRAWL_TRIGGER: ${{ github.event_name == 'schedule' && 'github_schedule_details' || 'github_manual_details' }}
          RUN_DISCOVERY: "0"
          RUN_DETAILS: "1"
          SYNC_SEARCH_DEFINITIONS: "0"

          # Keep details conservative to reduce blocks.
          MAX_JOB_DETAILS_PER_RUN: "200"
          DETAIL_BLOCKED_RETRY_HOURS: "24"
          # Cool down after a blocked run before attempting another details pass.
          DETAIL_COOLDOWN_AFTER_BLOCK_MINUTES: "180"

        run: |
          python -m scripts.run_crawl

      - name: Refresh dashboard read models
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
        run: |
          python -m scripts.refresh_dashboard_read_models

      - name: Report latest run
        if: always()
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DATABASE: ${{ secrets.SUPABASE_DATABASE }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}
          SUPABASE_SSLMODE: ${{ secrets.SUPABASE_SSLMODE }}
        run: |
          python -m scripts.report_latest_run

      - name: Upload artifacts (output/)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/**
          if-no-files-found: warn
